<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarifai — Tutor Launch Error</title>
  <style>
    :root {
      --bg: #f4efe7;
      --card: #fffdf8;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5dccf;
      --accent: #a33a2b;
      --accent-soft: #f6d9d3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(640px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(70, 48, 28, 0.08);
      padding: 28px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.6;
    }

    .details {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #f8f5ef;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 11px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .btn-primary {
      background: var(--text);
      color: white;
    }

    .btn-secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: white;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Tutor Launch Error</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>

    {% if details %}
    <div class="details">{{ details }}</div>
    {% endif %}

    <div class="actions">
      <a class="btn btn-primary" href="javascript:window.location.reload()">Try again</a>
      <a class="btn btn-secondary" href="javascript:window.close()">Close tab</a>
    </div>
  </main>
</body>
</html>
